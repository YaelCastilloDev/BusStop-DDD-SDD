services:
  keycloak.auth.api:
    image: ${DOCKER_REGISTRY-}busstopweb
    container_name: api
    build:
      context: .
      dockerfile: src/BusStop.Web/Dockerfile
    ports:
      - 5000:8080
      - 5001:8081
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://aspire-dashboard:18889"
    restart: unless-stopped
    depends_on:
      - postgres
      - keycloak

  aspire-dashboard:
    container_name: aspire-dashboard
    image: mcr.microsoft.com/dotnet/aspire-dashboard:13
    ports:
      - 18888:18888
    restart: unless-stopped

  postgres:
    image: postgres:17
    container_name: keycloak-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: keycloak-auth
    volumes:
      - ./containers/database:/var/lib/postgresql/data
    restart: unless-stopped
    ports:
      - 5432:5432

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.2
    container_name: keycloak
    command: start-dev
    depends_on:
      - postgres
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HEALTH_ENABLED: "true"
      KC_DB: postgres
      KC_DB_USERNAME: ${DB_USER}
      KC_DB_PASSWORD: ${DB_PASSWORD}
      KC_DB_SCHEMA: keycloak
      KC_DB_URL_HOST: postgres
      KC_DB_PORT: 5432
      KC_DB_URL_DATABASE: keycloak-auth
      # Production Proxy Settings
      KC_HOSTNAME: ${DOMAIN}
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
    volumes:
      - ./containers/identity:/opt/keycloak/data
    ports:
      - 8080:8080
  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - keycloak
    restart: unless-stopped
